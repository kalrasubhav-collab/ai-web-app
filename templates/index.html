<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AI Chat</h1>
        <div id="role-selector">
            <label for="role-select">Role:</label>
            <select id="role-select">
                <option value="general" selected>General Assistant</option>
                <option value="coding">Coding Assistant</option>
                <option value="writing">Writing Coach</option>
                <option value="socratic">Socratic Teacher</option>
            </select>
        </div>
        <div id="chat-box"></div>
        <form id="chat-form">
            <textarea id="user-input" placeholder="Type your message..." rows="3" required></textarea>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("chat-form");
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const sendBtn = document.getElementById("send-btn");
        const roleSelect = document.getElementById("role-select");

        function addMessage(text, role) {
            const div = document.createElement("div");
            div.className = "message " + role;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "Sending...";

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, role: roleSelect.value }),
                });
                const data = await res.json();
                if (data.error) {
                    addMessage("Error: " + data.error, "error");
                } else {
                    addMessage(data.reply, "assistant");
                }
            } catch (err) {
                addMessage("Error: Could not reach server.", "error");
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send";
            }
        });

        const roleLabels = {
            general: "General Assistant",
            coding: "Coding Assistant",
            writing: "Writing Coach",
            socratic: "Socratic Teacher",
        };

        roleSelect.addEventListener("change", () => {
            chatBox.innerHTML = "";
            const label = roleLabels[roleSelect.value];
            const notice = document.createElement("div");
            notice.className = "message system";
            notice.textContent = "Switched to " + label + " — starting fresh conversation";
            chatBox.appendChild(notice);
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                form.dispatchEvent(new Event("submit"));
            }
        });
    </script>
</body>
</html>
